<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NutriBot Tester</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --muted: #94a3b8;
        --text: #e2e8f0;
        --accent: #10b981;
        --accent-2: #0ea5e9;
        --user: #1f2937;
        --bot: #064e3b;
        --border: #1e293b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Segoe UI, Arial, sans-serif;
        background: radial-gradient(circle at top, #111827, var(--bg));
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
      }
      .app {
        width: min(760px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
      }
      .title { font-weight: 600; }
      .status { font-size: 12px; color: var(--muted); }
      .ok { color: var(--accent); }
      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
      }
      input {
        width: 100%;
        background: #0b1220;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
      }
      .chat {
        height: 420px;
        overflow-y: auto;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .msg {
        max-width: 88%;
        padding: 10px 12px;
        border-radius: 10px;
        white-space: pre-wrap;
        line-height: 1.35;
        font-size: 14px;
      }
      .user { align-self: flex-end; background: var(--user); }
      .bot { align-self: flex-start; background: var(--bot); }
      .composer {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        padding: 10px 14px 14px;
        border-top: 1px solid var(--border);
      }
      button {
        border: none;
        border-radius: 8px;
        padding: 10px 14px;
        color: white;
        cursor: pointer;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        font-weight: 600;
      }
      .hint { font-size: 12px; color: var(--muted); padding: 0 14px 12px; }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="header">
        <div class="title">NutriBot · Frontend de prueba</div>
        <div id="status" class="status">Conectando...</div>
      </div>

      <div class="controls">
        <input id="phone" value="+573001234567" placeholder="Teléfono" />
        <input id="apiBase" value="/api" placeholder="Base API" />
      </div>

      <section id="chat" class="chat">
        <div class="msg bot">Hola 👋 escribe algo como: "estoy buscando proteína para subir masa"</div>
      </section>

      <div class="composer">
        <input id="text" placeholder="Escribe tu mensaje..." />
        <button id="send">Enviar</button>
      </div>
      <div class="hint">Este tester usa <code>POST /api/webhook</code>.</div>
    </main>

    <script>
      const chat = document.getElementById('chat');
      const statusEl = document.getElementById('status');
      const phoneEl = document.getElementById('phone');
      const apiBaseEl = document.getElementById('apiBase');
      const textEl = document.getElementById('text');
      const sendBtn = document.getElementById('send');

      function append(role, text) {
        const el = document.createElement('div');
        el.className = `msg ${role}`;
        el.textContent = text;
        chat.appendChild(el);
        chat.scrollTop = chat.scrollHeight;
      }

      async function checkHealth() {
        try {
          const res = await fetch(`${apiBaseEl.value}/health`);
          statusEl.textContent = res.ok ? 'Backend online' : 'Backend no responde';
          statusEl.className = res.ok ? 'status ok' : 'status';
        } catch {
          statusEl.textContent = 'Backend offline';
          statusEl.className = 'status';
        }
      }

      async function sendMessage() {
        const text = textEl.value.trim();
        const phone = phoneEl.value.trim();
        if (!text || !phone) return;

        append('user', text);
        textEl.value = '';
        sendBtn.disabled = true;

        try {
          const res = await fetch(`${apiBaseEl.value}/webhook`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone, text })
          });
          const data = await res.json();

          if (!res.ok) {
            append('bot', `Error ${res.status}: ${data.error || 'request failed'}`);
          } else {
            append('bot', data.response || 'Sin respuesta');
          }
        } catch (e) {
          append('bot', 'No se pudo conectar al backend.');
        } finally {
          sendBtn.disabled = false;
          textEl.focus();
        }
      }

      sendBtn.addEventListener('click', sendMessage);
      textEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
      });

      checkHealth();
    </script>
  </body>
</html>
