<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriBot – Simulador WhatsApp</title>
  <style>
    :root {
      --wa-bg: #0b141a;
      --wa-chat-bg: #0b141a;
      --wa-header: #202c33;
      --wa-input-bg: #2a3942;
      --wa-green: #005c4b;
      --wa-green-light: #025144;
      --wa-incoming: #202c33;
      --wa-text: #e9edef;
      --wa-text-secondary: #8696a0;
      --wa-border: #2a3942;
      --wa-accent: #00a884;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #111b21;
      color: var(--wa-text);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat-container {
      width: 100%;
      max-width: 500px;
      height: 100vh;
      max-height: 750px;
      display: flex;
      flex-direction: column;
      background: var(--wa-chat-bg);
      border-radius: 0;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    @media (min-width: 600px) {
      .chat-container {
        border-radius: 12px;
        height: 90vh;
      }
    }

    /* Header */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--wa-header);
      border-bottom: 1px solid var(--wa-border);
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--wa-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-info h3 {
      font-size: 16px;
      font-weight: 500;
      color: var(--wa-text);
    }

    .header-info span {
      font-size: 12px;
      color: var(--wa-accent);
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
    }

    .status-dot.online { background: var(--wa-accent); }

    .status-text {
      font-size: 11px;
      color: var(--wa-text-secondary);
    }

    /* Messages area */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background-image: url("data:image/svg+xml,%3Csvg width='300' height='300' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cpattern id='p' width='60' height='60' patternUnits='userSpaceOnUse'%3E%3Cpath d='M30 5 L35 15 L30 10 L25 15Z' fill='%230d1a14' opacity='0.3'/%3E%3C/pattern%3E%3C/defs%3E%3Crect width='100%25' height='100%25' fill='url(%23p)'/%3E%3C/svg%3E");
    }

    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
    }

    .message {
      max-width: 85%;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.45;
      position: relative;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .message .time {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      float: right;
      margin-left: 10px;
      margin-top: 4px;
    }

    .message.sent {
      background: var(--wa-green);
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }

    .message.received {
      background: var(--wa-incoming);
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }

    .message.system {
      align-self: center;
      background: rgba(255,255,255,0.08);
      font-size: 12px;
      color: var(--wa-text-secondary);
      padding: 6px 16px;
      border-radius: 6px;
    }

    .typing-indicator {
      align-self: flex-start;
      background: var(--wa-incoming);
      padding: 12px 18px;
      border-radius: 8px;
      border-bottom-left-radius: 2px;
      display: none;
    }

    .typing-indicator.active { display: flex; gap: 4px; }

    .typing-dot {
      width: 7px;
      height: 7px;
      background: var(--wa-text-secondary);
      border-radius: 50%;
      animation: typingBounce 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Input area */
    .chat-input {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      background: var(--wa-header);
      border-top: 1px solid var(--wa-border);
    }

    .chat-input input {
      flex: 1;
      background: var(--wa-input-bg);
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      color: var(--wa-text);
      font-size: 15px;
      outline: none;
    }

    .chat-input input::placeholder {
      color: var(--wa-text-secondary);
    }

    .chat-input button {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: var(--wa-accent);
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .chat-input button:hover { background: #009973; }
    .chat-input button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Phone config */
    .phone-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: rgba(0,168,132,0.08);
      border-bottom: 1px solid var(--wa-border);
      font-size: 12px;
      color: var(--wa-text-secondary);
    }

    .phone-bar input {
      background: var(--wa-input-bg);
      border: 1px solid var(--wa-border);
      border-radius: 4px;
      padding: 4px 8px;
      color: var(--wa-text);
      font-size: 12px;
      width: 160px;
      outline: none;
    }

    .phone-bar input:focus {
      border-color: var(--wa-accent);
    }

    /* Quick actions */
    .quick-actions {
      display: flex;
      gap: 6px;
      padding: 6px 12px;
      background: var(--wa-header);
      overflow-x: auto;
      flex-wrap: nowrap;
    }

    .quick-actions::-webkit-scrollbar { display: none; }

    .quick-btn {
      padding: 5px 12px;
      border: 1px solid var(--wa-border);
      border-radius: 16px;
      background: transparent;
      color: var(--wa-accent);
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .quick-btn:hover {
      background: rgba(0,168,132,0.15);
      border-color: var(--wa-accent);
    }

    /* Bold / formatting in messages */
    .message b, .message strong {
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <!-- Header -->
    <div class="chat-header">
      <div class="avatar">🤖</div>
      <div class="header-info">
        <h3>NutriBot</h3>
        <span id="statusLabel">Conectando...</span>
      </div>
      <div class="header-actions">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">offline</span>
      </div>
    </div>

    <!-- Phone number config -->
    <div class="phone-bar">
      📱 Tu número:
      <input type="text" id="phoneInput" value="+573001234567" />
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="messages">
      <div class="message system">Chat simulado — los mensajes se envían al backend de NutriBot</div>
    </div>

    <!-- Typing indicator -->
    <div class="typing-indicator" id="typing">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>

    <!-- Quick actions -->
    <div class="quick-actions">
      <button class="quick-btn" onclick="sendQuick('hola')">👋 Hola</button>
      <button class="quick-btn" onclick="sendQuick('catálogo')">📋 Catálogo</button>
      <button class="quick-btn" onclick="sendQuick('carrito')">🛒 Carrito</button>
      <button class="quick-btn" onclick="sendQuick('ayuda')">❓ Ayuda</button>
      <button class="quick-btn" onclick="sendQuick('volver')">⬅ Volver</button>
      <button class="quick-btn" onclick="sendQuick('pedir')">✅ Pedir</button>
    </div>

    <!-- Input -->
    <div class="chat-input">
      <input type="text" id="msgInput" placeholder="Escribe un mensaje..." autocomplete="off" />
      <button id="sendBtn" onclick="send()">➤</button>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3005/api';
    const messagesEl = document.getElementById('messages');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingEl = document.getElementById('typing');
    const phoneInput = document.getElementById('phoneInput');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const statusLabel = document.getElementById('statusLabel');

    // Check health on load
    checkHealth();

    msgInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    async function checkHealth() {
      try {
        const res = await fetch(`${API}/health`);
        if (res.ok) {
          statusDot.classList.add('online');
          statusText.textContent = 'online';
          statusLabel.textContent = 'En línea';
        }
      } catch {
        statusDot.classList.remove('online');
        statusText.textContent = 'offline';
        statusLabel.textContent = 'Desconectado';
      }
    }

    function getTime() {
      return new Date().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
    }

    function formatText(text) {
      // WhatsApp-style formatting: *bold*, _italic_
      return text
        .replace(/\*(.*?)\*/g, '<b>$1</b>')
        .replace(/_(.*?)_/g, '<em>$1</em>');
    }

    function addMessage(text, type = 'received') {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.innerHTML = `${formatText(text)}<span class="time">${getTime()}</span>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping(show) {
      typingEl.classList.toggle('active', show);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function send() {
      const text = msgInput.value.trim();
      if (!text) return;

      const phone = phoneInput.value.trim();
      if (!phone) {
        addMessage('⚠️ Configura tu número de teléfono arriba', 'system');
        return;
      }

      msgInput.value = '';
      sendBtn.disabled = true;
      addMessage(text, 'sent');
      showTyping(true);

      try {
        const res = await fetch(`${API}/webhook`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, text }),
        });

        const data = await res.json();

        // Simulate delay for realism
        await new Promise(r => setTimeout(r, 400 + Math.random() * 600));
        showTyping(false);

        if (data.response) {
          addMessage(data.response, 'received');
        } else if (data.error) {
          addMessage(`❌ Error: ${data.error}`, 'system');
        }
      } catch (err) {
        showTyping(false);
        addMessage('❌ No se pudo conectar con NutriBot. ¿Está corriendo el servidor?', 'system');
        statusDot.classList.remove('online');
        statusText.textContent = 'offline';
        statusLabel.textContent = 'Desconectado';
      }

      sendBtn.disabled = false;
      msgInput.focus();
    }

    function sendQuick(text) {
      msgInput.value = text;
      send();
    }
  </script>
</body>
</html>
